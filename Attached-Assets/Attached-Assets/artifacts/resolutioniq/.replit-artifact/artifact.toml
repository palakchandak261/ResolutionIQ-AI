kind = "web"
previewPath = "/"
title = "ResolutionIQ AI"
version = "1.0.0"
id = "artifacts/resolutioniq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19144

[services.development]
run = "pnpm --filter @workspace/resolutioniq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resolutioniq", "run", "build" ]
publicDir = "artifacts/resolutioniq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19144"
BASE_PATH = "/"
